services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    image: notification-service:latest
    container_name: notification-service-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-notification_service}
      DB_USERNAME: ${DB_USERNAME:-notification}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: database
      MAIL_MAILER: smtp
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      LOG_CHANNEL: stack
      LOG_STACK: single,stderr
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - notification-net

  queue:
    image: notification-service:latest
    container_name: notification-service-queue
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=1", "--timeout=60", "--verbose"]
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-notification_service}
      DB_USERNAME: ${DB_USERNAME:-notification}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: database
      MAIL_MAILER: smtp
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      LOG_CHANNEL: stack
      LOG_STACK: single,stderr
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
    networks:
      - notification-net

  mysql:
    image: mysql:8.0
    container_name: notification-service-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-notification_service}
      MYSQL_USER: ${DB_USERNAME:-notification}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT_HOST:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - notification-net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: notification-service-mailhog
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - notification-net

networks:
  notification-net:
    driver: bridge

volumes:
  mysql-data:
    driver: local
